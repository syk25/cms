app = "cms-ui"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.streamlit"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  API_BASE = "https://cms-api.fly.dev"
